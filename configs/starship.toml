# Starship Config File
# @CogentMusik
#
# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true


format = """
$username\
$directory\
$c\
$docker_context\
$elixir\
$elm\
$git_branch\
$git_status\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$python\
$rust\
\n\
\n$character\
\n
"""
right_format = """
$cmd_duration\
$time\
$hostname\
"""


[username]
style_user = "#E5C890"
style_root = "#E78284"
format = " Ό╜╝ [$user]($style) "
disabled = false
show_always = true

# Set up Host
[hostname]
ssh_only = false
format = '≤░ΘΖ [arch-cogent](#E5C890)'
trim_at = "."
disabled = false

# Setup Time
[time]
disabled = false
time_format = "%R"
format = "ΏθΧΡ[ $time ](#C6D0F5)"

# Replace the 'έζψ' symbol in the prompt with 'έηε'
[character] # The name of the module we are configuring is 'character'
success_symbol = '[ ≤░ΒΧ](#A6D189)' # The 'success_symbol' segment is being set to 'έηε' with the color 'bold green'
error_symbol = '[ ΌςΘ ](#E78284)'



# Configure Directory
[directory]
read_only = " ≤░Ν╛"
truncation_length = 5
truncate_to_repo = true
truncation_symbol = '.../'
style = "bold italic #A6D189"
home_symbol = "ΌαΩ "

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "≤░Ιβ "
"Downloads" = "ΎΑβ "
"Music" = "ΎΑΒ "
"Pictures" = "ΎΑ╛ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ΎεαΎΕς "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important Ύεα " = " ΎεαΎΕς "

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

# Setup TimeOut
[cmd_duration]
min_time = 4
show_milliseconds = false
disabled = false
style = "bold italic red"

[c]
symbol = "Όαη "
format = '[ $symbol ]($style)'

[docker_context]
symbol = "ΎΝΙ "
format = '[ $symbol $context ]($style) $path'

[elixir]
symbol = "ΌΚ╡ "
format = '[ $symbol ]($style)'

[elm]
symbol = "Όαυ "
format = '[ $symbol ]($style)'

[git_branch]
symbol = "Όεξ "
format = '[ $symbol $branch ]($style)'

[git_status]
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = "Όαπ "
format = '[ $symbol ]($style)'

[haskell]
symbol = "Όζ╖ "
format = '[ $symbol ]($style)'

[java]
symbol = "ΌΚΨ "
format = '[ $symbol ]($style)'

[julia]
symbol = "Όαν "
format = '[ $symbol ]($style)'

[nodejs]
symbol = "Όεα"
format = '[ $symbol ]($style)'

[nim]
symbol = "Όβ╖ "
format = '[ $symbol ]($style)'

[python]
symbol = "≤▒ΦΟ "
format = '[ $symbol ]($style)'

[rust]
symbol = "Όηρ"
format = '[ $symbol ]($style)'


